# bench_UI_simple/config/config.yaml
# NVIDIA Blackwell (DGX Spark) Optimized Configuration
# Model families grouped by port range for clarity and scalability.

hardware:
  gpu_layers: 999
  ctx_size: 16384
  flash_attn: "on"
  reasoning: "off"
  pre_start_all: false  # 부팅 시 모든 모델 서버를 미리 가동할지 여부 (VRAM 관리 위해 false 권장)

# Port Allocation Strategy:
# 8000: Main UI (Docker mapping 8000:7860)
# 810x: Qwen Series
# 811x: Gemma Series
# 812x: LFM Series
# 813x: GPT-OSS Series
# 814x: Vision/Other Series

