  Gemma-4_26B:
    port: 8086
    repo_id: "sowilow/gemma-4-26b-a4b-it-DGX-Spark-GGUF"
    model_path: "models/gemma-4-26b-a4b-it-q4_k_m.gguf"
    mmproj_path: "models/gemma-4-26b-vision-mmproj-f16.gguf"
  Gemma-4_E2B:
