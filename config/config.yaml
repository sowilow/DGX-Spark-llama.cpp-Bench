# bench_UI_simple/config/config.yaml
# NVIDIA Blackwell (DGX Spark) Optimized Configuration

hardware:
  gpu_layers: 999
  ctx_size: 16384
  flash_attn: "on"
  reasoning: "off"
  pre_start_all: true  # 부팅 시 모든 모델 서버를 미리 가동할지 여부

# Simultaneous multi-model serving configuration
models:
  Qwen3.5_2B:
    port: 8081
    repo_id: "sowilow/Qwen3.5-2B-DGX-Spark-GGUF"
    model_path: "models/qwen3.5-2b-q4_k_m.gguf"
    mmproj_path: "models/qwen3.5-2b-mmproj-f16.gguf"
  Qwen3.5_35B:
    port: 8082
    repo_id: "sowilow/Qwen3.5-35B-A3B-DGX-Spark-GGUF"
    model_path: "models/qwen3.5-35b-a3b-q4_k_m.gguf"
    mmproj_path: "models/qwen3.5-2b-mmproj-f16.gguf" # Shares same vision projector
  InternVL3.5_2B:
    port: 8083
    repo_id: "sowilow/InternVL-3.5-2B-DGX-Spark-GGUF"
    model_path: "models/internvl3_5-2b-flash-q4_k_m.gguf"
    mmproj_path: "models/internvl3_5-2b-flash-mmproj.gguf"
  LFM2.5_1.6B:
    port: 8084
    repo_id: "sowilow/LFM-2.5-1.6B-DGX-Spark-GGUF"
    model_path: "models/LFM2.5-VL-1.6B.Q4_K_M.gguf"
    mmproj_path: "models/mmproj-f16.gguf"
  Next2_Air:
    port: 8085
    repo_id: "sowilow/Next2-Air-DGX-Spark-GGUF"
