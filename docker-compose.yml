# bench_UI_simple/docker-compose.yml
services:
  vlm-benchmark:
    image: ghcr.io/sowilow/dgx-spark-llama.cpp-bench:latest
    build:
      context: .
      dockerfile: Docker/Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ports:
      - "7860:7860" # Main Web UI (Unified Port 8000)
      - "8100-8150:8100-8150" # Pre-allocated Model Server Ports
    volumes:
      - .:/app
      - ./models:/app/models
    environment:
      - LLAMA_SERVER_PATH=/usr/local/bin/llama-server
      - AUTO_DOWNLOAD=Y
    stdin_open: true
    tty: true
    restart: unless-stopped
